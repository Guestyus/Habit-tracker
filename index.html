<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mission: Consistency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#c9a437;          /* 00-gold */
  --primary-bright:#e8c96a;
  --primary-light:rgba(201,164,55,.12);
  --primary-glow:rgba(201,164,55,.25);
  --today-col:rgba(201,164,55,.07);
  --today-border:rgba(201,164,55,.45);
  --red:#a8132c;              /* poster red */
  --red-glow:rgba(168,19,44,.4);
  --bg:#070708;
  --surface:#0d0e11;
  --surface-2:#13141a;
  --surface-3:#1a1c24;
  --border:#23242c;
  --text:#e9e7df;             /* platinum */
  --muted:#76746a;            /* smoke */
  --danger:#a8132c;
  --streak:#c9a437;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Oswald',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;
  min-height:100vh;
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--surface-3);border:1px solid var(--border);
  color:var(--text);padding:10px 22px;border-radius:2px;
  font-family:'IBM Plex Mono',monospace;font-size:.74rem;letter-spacing:1.5px;text-transform:uppercase;
  opacity:0;transition:opacity .25s,transform .25s;z-index:9999;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.green{background:var(--primary);border-color:var(--primary);color:#0a0a0c;font-weight:500}

/* ── LOADING — gun-barrel rings ── */
#loadingOverlay{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:4000;padding:20px;text-align:center;
}
.barrel{position:relative;width:120px;height:120px;margin-bottom:26px}
.barrel span{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--primary);opacity:.18;
  animation:barrelPulse 2.2s ease-in-out infinite;
}
.barrel span:nth-child(2){inset:16px;animation-delay:.25s;opacity:.3}
.barrel span:nth-child(3){inset:32px;animation-delay:.5s;opacity:.45}
.barrel span:nth-child(4){inset:48px;animation-delay:.75s;opacity:.7;border-width:3px}
.barrel::after{
  content:'';position:absolute;inset:56px;border-radius:50%;
  background:var(--primary);box-shadow:0 0 18px var(--primary-glow);
  animation:barrelPulse 2.2s ease-in-out infinite;animation-delay:1s;
}
@keyframes barrelPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.loading-logo{font-family:'Cinzel',serif;font-size:2rem;color:var(--primary);letter-spacing:8px;margin-bottom:6px}
.loading-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:18px}
.loading-bar{width:220px;height:2px;background:#1a1a1e;overflow:hidden}
.loading-fill{height:100%;background:var(--primary);animation:loadPulse 1.3s ease-in-out infinite}
@keyframes loadPulse{0%{width:0%}60%{width:80%}100%{width:100%}}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:.64rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:14px;line-height:1.8}

/* ── CLASSIFIED STRIP ── */
.classified-strip{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#0a0a0d;border-bottom:1px solid var(--border);
  padding:7px 12px;font-family:'IBM Plex Mono',monospace;
  font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
  white-space:nowrap;overflow:hidden;
}
.classified-strip b{color:var(--red);font-weight:500}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red-glow);animation:blink 1.6s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── LAYOUT ── */
.outer{display:flex;align-items:flex-start;max-width:1900px;margin:0 auto;padding:14px}

/* ── DESKTOP SIDEBAR ── */
#desktopSidebar{
  width:262px;flex-shrink:0;
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--primary);
  overflow:hidden;position:sticky;top:14px;
  display:flex;flex-direction:column;
}
.sidebar-header{
  padding:18px 16px 14px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(201,164,55,.05),transparent);
}
.sidebar-date{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:5px}
.sidebar-title{font-family:'Cinzel',serif;font-size:1.35rem;letter-spacing:3px;color:var(--primary);line-height:1}
.sidebar-sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--text);margin-top:5px;letter-spacing:1px}
.sidebar-habits{padding:10px;display:flex;flex-direction:column;gap:6px}
.sb-habit{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border:1px solid var(--border);border-left:3px solid var(--border);
  background:var(--surface-2);cursor:pointer;user-select:none;
  transition:all .18s ease;
}
.sb-habit:hover{border-color:#34353f;background:var(--surface-3)}
.sb-habit.done{background:var(--primary-light);border-color:var(--primary);border-left-color:var(--primary)}
.sb-habit:active{transform:scale(.97)}
.sb-icon{font-size:1.1rem;flex-shrink:0;transition:transform .2s ease}
.sb-habit.done .sb-icon{transform:scale(1.12)}
.sb-name{font-size:.78rem;font-weight:600;letter-spacing:.8px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);text-transform:uppercase}
.sb-habit.done .sb-name{color:var(--primary-bright)}
.sb-check{width:17px;height:17px;border-radius:50%;border:2px solid #3c3a30;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.sb-habit.done .sb-check{background:var(--primary);border-color:var(--primary)}
.sb-habit.done .sb-check::after{content:'';width:5px;height:5px;border-radius:50%;background:#0a0a0c}
.sidebar-msg{padding:16px;font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);text-align:center;line-height:1.8;letter-spacing:1px;text-transform:uppercase}
.sidebar-stats{
  margin:0 10px 10px;padding:12px;background:var(--surface-2);
  border:1px solid var(--border);
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.ss-item{text-align:center}
.ss-val{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--primary);line-height:1}
.ss-lbl{font-family:'IBM Plex Mono',monospace;font-size:.54rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}
.sidebar-mark-btn{
  margin:0 10px 14px;padding:12px;
  background:transparent;border:1px solid var(--primary);
  color:var(--primary);font-family:'Oswald',sans-serif;
  font-weight:600;font-size:.78rem;cursor:pointer;letter-spacing:2px;text-transform:uppercase;
  transition:all .15s;
}
.sidebar-mark-btn:hover{background:var(--primary);color:#0a0a0c}
.sidebar-mark-btn.all-done{background:var(--primary);color:#0a0a0c}
.sidebar-hint{
  margin:0 10px 14px;padding:10px 12px;
  background:rgba(255,255,255,.015);border:1px solid var(--border);
  font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--muted);line-height:1.9;letter-spacing:.5px;
}
.key-badge{display:inline-block;background:var(--surface-3);border:1px solid var(--border);padding:1px 5px;font-size:.54rem;color:var(--primary);margin-right:3px}

/* ── MAIN PANEL ── */
.main-panel{
  flex:1;min-width:0;margin-left:14px;
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--primary);
  overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.5);
}

/* ── TABS — dossier folders ── */
.tabs{display:flex;background:#08080a;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;text-align:center;padding:12px 8px;color:var(--muted);cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.64rem;
  text-transform:uppercase;letter-spacing:1.5px;
  border-right:1px solid #131318;white-space:nowrap;
  position:relative;user-select:none;transition:color .2s,background .2s;
}
.tab:hover:not(.active){color:#bdbab0;background:rgba(255,255,255,.02)}
.tab.active{color:var(--primary-bright);background:linear-gradient(180deg,rgba(201,164,55,.14),rgba(201,164,55,.02))}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--primary)}
.tab.current-month::before{content:'';position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 5px var(--red-glow)}
.tab.year-tab{background:#0b0b0e;color:var(--text);flex:1.3}
.tab.year-tab.active{color:var(--primary-bright)}

/* ── HEADER ── */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 22px;gap:18px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(201,164,55,.03),transparent);
}
.title-section h2{font-family:'Cinzel',serif;font-size:2.1rem;font-weight:600;letter-spacing:6px;color:var(--primary);line-height:1}
.title-section .subtitle{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px}
.quote-container{
  flex:1;min-width:200px;display:flex;align-items:center;
  background:rgba(255,255,255,.015);border-left:2px solid var(--primary);
  padding:10px 14px;
}
.quote-container:focus-within{background:rgba(201,164,55,.05)}
.quote-input{width:100%;background:transparent;border:none;color:var(--muted);font-style:italic;font-size:.85rem;outline:none;font-family:Georgia,serif}
.quote-input::placeholder{color:#34322c}
#shuffleBtn{background:none;border:none;color:var(--muted);font-size:1.05rem;cursor:pointer;padding:0 0 0 8px;flex-shrink:0;transition:transform .4s}
.charts-row{display:flex;align-items:center;gap:14px}
.chart-label{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-top:5px}
.area-chart{width:160px;height:62px;background:rgba(0,0,0,.35);border:1px solid var(--border);overflow:hidden}
.donut-wrapper{position:relative;width:78px;height:78px}
.donut-wrapper svg{width:78px;height:78px;transform:rotate(-90deg)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-pct{font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:1px;color:var(--text);line-height:1}
.donut-sub{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* ── CONTROLS ── */
.table-controls{
  display:flex;gap:10px;padding:12px 20px;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:var(--surface-2);
}
.controls-left{display:flex;gap:8px;align-items:center}
.stats-pill{
  font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  padding:6px 14px;white-space:nowrap;letter-spacing:1px;text-transform:uppercase;
}
.stats-pill span{color:var(--primary);font-weight:500}
.btn{
  height:36px;padding:0 16px;display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--border);background:var(--surface-2);color:var(--text);
  font-weight:600;cursor:pointer;font-size:.74rem;
  font-family:'Oswald',sans-serif;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;min-width:0;
  transition:all .15s;
}
.btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.btn-edit:hover{background:var(--surface-3);border-color:#34353f}
.btn-add{background:var(--primary);color:#0a0a0c;border-color:var(--primary);display:none}
.btn-add:hover{background:var(--primary-bright)}
.btn-today{background:transparent;color:var(--primary);border-color:var(--primary)}
.btn-today:hover{background:var(--primary);color:#0a0a0c}
.is-editing .btn-add{display:inline-flex!important}

/* ── TABLE ── */
.table-wrapper{width:100%;overflow-x:auto}
.table-wrapper::-webkit-scrollbar{height:4px}
.table-wrapper::-webkit-scrollbar-thumb{background:#2a2a30}
table{table-layout:fixed;border-collapse:collapse;width:100%;min-width:1100px}
th,td{border:1px solid var(--border);text-align:center;height:40px;transition:background .12s}
th{background:var(--surface-3);font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
th.week-header{color:var(--text);font-size:.58rem}
tbody tr:hover td{background:rgba(255,255,255,.015)}
tbody tr:hover td.col-habit{background:var(--surface-3)}
tbody tr:hover td.today-col{background:rgba(201,164,55,.12)}
td.today-col{background:var(--today-col);border-left-color:var(--today-border)!important;border-right-color:var(--today-border)!important}
th.today-col{background:rgba(201,164,55,.13)!important;color:var(--primary)!important}
.col-habit{width:250px;background:var(--surface-3)!important;position:sticky;left:0;z-index:10}
.col-progress{width:148px}
td.check-cell{cursor:pointer;position:relative}
td.check-cell:hover{background:var(--primary-light)!important}
td.check-cell:active{opacity:.75}
td.check-cell.today-col:hover::after{
  content:'◉ TODAY';position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--surface-3);border:1px solid var(--primary);color:var(--primary);
  font-family:'IBM Plex Mono',monospace;font-size:.56rem;padding:3px 8px;
  white-space:nowrap;pointer-events:none;z-index:200;letter-spacing:1px;
}
/* target-style checkboxes */
input[type="checkbox"]{
  appearance:none;width:19px;height:19px;background:transparent;
  border:2px solid #3c3a30;border-radius:50%;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  vertical-align:middle;transition:all .13s;pointer-events:none;
}
input[type="checkbox"]:checked{background:var(--primary);border-color:var(--primary);box-shadow:0 0 7px var(--primary-glow)}
input[type="checkbox"]:checked::after{content:'';width:6px;height:6px;border-radius:50%;background:#0a0a0c}

/* ── HABIT CELL ── */
.habit-cell{display:flex;align-items:center;height:100%;padding:0 8px;gap:4px}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .2s}
.habit-input{
  flex:1;border:none;background:transparent;color:var(--text);
  font-size:.8rem;font-weight:600;text-align:right;outline:none;padding:0 4px;
  font-family:'Oswald',sans-serif;letter-spacing:1px;min-width:0;text-transform:uppercase;
}
.habit-input:focus{color:var(--primary-bright)}
.streak-badge{font-size:.62rem;white-space:nowrap;color:var(--streak);font-family:'IBM Plex Mono',monospace;opacity:0;transition:opacity .2s}
.streak-badge.visible{opacity:1}

/* ── PROGRESS ── */
.progress-bar-bg{width:82%;height:4px;background:#191a1f;margin:0 auto 4px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#8a6f24,var(--primary));transition:width .4s ease}
.progress-text{font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:500;color:var(--text)}
.progress-count{font-family:'IBM Plex Mono',monospace;font-size:.54rem;color:var(--muted);letter-spacing:.5px}

/* ── EDIT MODE ── */
.is-editing .btn-delete,.is-editing .reorder-btns{display:flex!important}
.reorder-btns{display:none;flex-direction:column;gap:1px}
.btn-move{background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 2px;font-size:.6rem;line-height:1;transition:color .15s}
.btn-move:hover{color:var(--primary)}
.btn-delete{display:none;background:none;border:none;color:var(--danger);font-size:1.5rem;cursor:pointer;line-height:1;padding:0 4px;transition:opacity .15s}
.btn-delete:hover{opacity:.7}

/* ── YEAR ── */
.summary-cell{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.7rem}

/* ── FOOTER STATS ── */
.footer-stats{display:flex;padding:12px 20px;border-top:1px solid var(--border);background:var(--surface-2)}
.stat-item{flex:1;text-align:center;padding:6px 0;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-value{font-family:'Cinzel',serif;font-size:1.25rem;color:var(--primary);line-height:1}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:.53rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}

/* ── DAY MODAL ── */
#dayModal{
  position:fixed;inset:0;background:rgba(5,5,6,.92);z-index:3000;
  display:none;flex-direction:column;backdrop-filter:blur(6px);
}
.modal-content{
  margin-top:auto;background:var(--surface);
  border-top:2px solid var(--primary);
  padding:28px;max-height:90%;overflow-y:auto;
  animation:slideUp .28s ease-out;
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-family:'Cinzel',serif;font-size:1.5rem;letter-spacing:3px;color:var(--primary)}
.modal-month{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;margin-top:4px}
.modal-close{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:1.3rem;width:40px;height:40px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal-close:hover{border-color:var(--primary);color:var(--primary)}
.modal-progress{margin:14px 0;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-pct{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--primary)}
.modal-pct-lbl{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.modal-days-info{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);text-align:right;line-height:1.7;letter-spacing:.5px}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:4px}
.day-btn{
  aspect-ratio:1;border-radius:50%;border:1px solid var(--border);
  background:var(--surface-2);color:var(--muted);
  font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;transition:all .14s;
}
.day-btn:hover{border-color:#44443c;background:var(--surface-3);color:var(--text)}
.day-btn:active{transform:scale(.9)}
.day-btn.checked{background:var(--primary);border-color:var(--primary);color:#0a0a0c;font-weight:700}
.day-btn.today-day{border-color:var(--primary);color:var(--primary)}
.day-btn.today-day.checked{color:#0a0a0c}
.day-btn.future-day{opacity:.25;pointer-events:none}
.modal-btn-done{
  width:100%;padding:15px;margin-top:20px;
  background:var(--primary);border:none;color:#0a0a0c;
  font-family:'Oswald',sans-serif;font-weight:600;font-size:.85rem;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.modal-btn-done:hover{background:var(--primary-bright)}

/* ── TODAY PANEL (mobile) ── */
#todayPanel{display:none;padding:12px 12px 0}
.today-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.today-panel-title{font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:2.5px;color:var(--primary)}
.today-panel-date{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--muted);text-align:right;letter-spacing:.5px;line-height:1.6}
.today-habits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.today-habit-btn{
  padding:12px 8px;text-align:center;cursor:pointer;
  border:1px solid var(--border);border-top:2px solid var(--border);
  background:var(--surface-2);
  user-select:none;-webkit-user-select:none;
  transition:all .2s ease;
}
.today-habit-btn.done{background:var(--primary-light);border-color:var(--primary);border-top-color:var(--primary)}

#mobileBottomNav{
  display:none;position:fixed;bottom:0;left:0;right:0;

/* ── MOBILE CARDS ── */
#mobileTaskList{display:none;padding:12px 12px 0;flex-direction:column;gap:10px}
.mobile-card{

}
.mobile-card.done-today{border-left-color:var(--primary);border-color:rgba(201,164,55,.35)}
.mobile-card:active{transform:scale(.97)}
.mobile-card.edit-mode{cursor:default}
.mobile-card-header{display:flex;justify-content:space-between;align-items:center;gap:10px}
.mobile-card-left{flex:1;min-width:0}
.mobile-card-name{font-weight:600;font-size:.9rem;letter-spacing:1px;display:block;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase}
.mobile-card-meta{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.5px}
.mobile-streak{font-size:.64rem;color:var(--streak);font-family:'IBM Plex Mono',monospace;margin-top:5px;letter-spacing:.5px}
.mobile-ring{flex-shrink:0;width:48px;height:48px;position:relative}
.mobile-ring svg{width:48px;height:48px;transform:rotate(-90deg)}
.mobile-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.78rem;color:var(--text)}
.mobile-edit-footer{display:none;border-top:1px solid var(--border);margin-top:12px;padding-top:12px;justify-content:space-between;align-items:center}
.is-editing .mobile-edit-footer{display:flex}
.btn-mobile-sm{height:38px;width:46px;font-size:.9rem;background:#1c1d24;border:1px solid var(--border);color:var(--text);cursor:pointer}
.btn-mobile-sm:active{background:#2a2b33}
.btn-mobile-del{
  background:transparent;border:1px solid var(--red);color:var(--red);
  padding:0 18px;font-weight:600;font-size:.72rem;cursor:pointer;height:38px;
  font-family:'Oswald',sans-serif;letter-spacing:2px;text-transform:uppercase;
}

/* ── RESPONSIVE ── */

}

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// ════════════════ FIREBASE (guarded — falls back to demo mode if blocked) ════════════════
let db = null, docRef = null;
try {
  if (typeof firebase !== 'undefined') {
    firebase.initializeApp({
      apiKey: "AIzaSyD6FAL9tEz7Cr7QXif0ERmDDJUTPs8EeZ4",
      authDomain: "habit-tracker-48336.firebaseapp.com",
      projectId: "habit-tracker-48336",
      storageBucket: "habit-tracker-48336.firebasestorage.app",
      messagingSenderId: "197128681235",
      appId: "1:197128681235:web:7afcfb89fcec875256cce6",
      measurementId: "G-L9M6XVL2KW"
    });
    db = firebase.firestore();
    db.settings({ experimentalAutoDetectLongPolling: true, merge: true });
    docRef = db.collection("dashboards").doc("final_v8_custom_habits");
  }
} catch (e) {
  console.warn('Firebase unavailable:', e);
}

// ════════════════ CONSTANTS ════════════════
const today      = new Date();
const YEAR       = today.getFullYear();
const todayMonth = today.getMonth();
const todayDay   = today.getDate() - 1;

const MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];
const monthsInfo = MONTH_NAMES.map((name, i) => ({
  name,
  days: new Date(YEAR, i + 1, 0).getDate()
}));

const ICONS = ['🎯','🕶️','⌚','🍸','🚗','♠️','💼','🛰️','🗝️','✈️','📡','🔦'];

const QUOTES = [
  "Discipline is the deadliest weapon in any arsenal.",
  "A mission is won in the preparation, not the execution.",
  "The best agents never miss twice in a row.",
  "Precision daily. Excellence eventually.",
  "Every objective completed is intel on who you're becoming.",
  "Trained instincts are just habits that survived contact.",
  "The streak is the mission. Protect it.",
  "Amateurs wait for motivation. Professionals run the protocol.",
  "Quiet consistency beats loud intentions.",
  "Your cover story is tomorrow. Your real work is today.",
  "No gadget replaces showing up.",
  "Debrief honestly. Execute relentlessly.",
  "Small wins, compounded daily, are unstoppable.",
  "The world's best operatives are simply consistent.",
  "Failure is recoverable. Quitting is not.",
  "Comfort is the enemy's best agent.",
  "Hold the line, one day at a time.",
  "Routine is the agent's true superpower.",
  "Trust the protocol when the will is weak.",
  "Mission readiness is built before the mission.",
  "Be lethal at the basics.",
  "Tomorrow's agent is built from today's checklist.",
  "Every checked box is a debt paid to your future self.",
  "Slow is smooth. Smooth is fast. Daily is forever.",
  "An objective a day keeps mediocrity away.",
  "License to rest is earned, never given.",
  "Show up sharp. Leave nothing unchecked.",
  "The target is yesterday's version of you.",
  "Win the morning, win the mission.",
  "Consistency: shaken, never stirred."
];

// ════════════════ STATE ════════════════
let currentView     = todayMonth;
let isEditing       = false;
let appState        = null;
let tabsInitialized = false;
let saveTimeout     = null;
let offlineMode     = false;

// ════════════════ HELPERS ════════════════
const key = (m, r, d) => m + "_" + r + "_" + d;

function haptic(pattern = 10) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showToast(msg, green = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('green', green);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show', 'green'), 2200);
}

function getRandomQuote() {
  return QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

function buildDefault() {
  return {
    habits: ["WORKOUT", "150G PROTEIN", "BED BY 9PM", "AWAKE BY 5AM", "10K STEPS DAILY"],
    data: {},
    quote: ""
  };
}

function safeSave() {
  if (offlineMode || !docRef) { showToast('⚠ Offline — intel not saved'); return; }
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    docRef.set(appState)
      .then(() => showToast('✓ Intel secured'))
      .catch(err => {
        console.warn('Save failed:', err);
        showToast('⚠ Transmission failed');
      });
  }, 400);
}

// ════════════════ BOOT ════════════════
const loadTimeout = setTimeout(() => {
  if (appState) return;
  console.warn('Secure link timeout — demo mode');
  offlineMode = true;
  appState = buildDefault();
  bootUI();
  showToast('⚠ Offline — changes will not save');
}, 6000);

if (docRef) {
  docRef.onSnapshot(doc => {
    clearTimeout(loadTimeout);
    offlineMode = false;
    appState = doc.exists ? doc.data() : buildDefault();
    if (!doc.exists) docRef.set(appState);
    bootUI();
  }, error => {
    clearTimeout(loadTimeout);
    console.error('Firestore error:', error);
    document.getElementById('loadingText').innerText = 'Link error: ' + error.message;
    document.getElementById('loadingText').style.color = '#a8132c';
    document.getElementById('retryBtn').style.display = 'inline-block';
  });
} else {
  // No Firebase at all (blocked CDN / sandboxed preview) — demo mode immediately
  clearTimeout(loadTimeout);
  offlineMode = true;
  appState = buildDefault();
  setTimeout(() => { bootUI(); showToast('Demo mode — connect online to save'); }, 600);
}

function bootUI() {
  document.getElementById('loadingOverlay').style.display = 'none';
  if (!tabsInitialized) {
    document.getElementById('quoteInput').value = appState.quote || getRandomQuote();
    document.getElementById('stripYear').textContent = YEAR;
    initTabs();
    tabsInitialized = true;
  }
  renderView();
}

document.getElementById('quoteInput').addEventListener('input', e => {
  if (appState) { appState.quote = e.target.value; safeSave(); }
});

function shuffleQuote() {
  const q = getRandomQuote();
  document.getElementById('quoteInput').value = q;
  const btn = document.getElementById('shuffleBtn');
  btn.style.transform = 'rotate(360deg)';
  setTimeout(() => { btn.style.transform = 'rotate(0deg)'; }, 400);
  if (appState) { appState.quote = q; safeSave(); }
}

// ════════════════ TABS ════════════════
function initTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  monthsInfo.forEach((m, i) => {
    const t = document.createElement('div');
    t.className = 'tab' + (i === todayMonth ? ' current-month' : '');
    t.dataset.index = i;
    t.textContent = m.name.substring(0, 3).toUpperCase();
    t.onclick = () => { currentView = i; renderView(); };
    container.appendChild(t);
  });
  const y = document.createElement('div');
  y.className = 'tab year-tab';
  y.dataset.index = 12;
  y.textContent = String(YEAR);
  y.onclick = () => { currentView = 12; renderView(); };
  container.appendChild(y);
}

function updateTabActiveStates() {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.index) === currentView);
  });
}

// ════════════════ STREAKS ════════════════
function getCurrentStreak(r) {
  let streak = 0;
  for (let d = todayDay; d >= 0; d--) {
    if (appState.data[key(todayMonth, r, d)]) streak++;
    else break;
  }
  return streak;
}

// ════════════════ RENDER ════════════════
function renderView() {
  updateTabActiveStates();
  document.getElementById('todayBtn').style.display =
    currentView === todayMonth ? 'inline-flex' : 'none';
  if (currentView === 12) renderYear(); else renderMonth();
  renderDesktopSidebar();
  renderTodayPanel();
  updateMobileNav();
}

function renderMonth() {
  const info = monthsInfo[currentView];
  const isCurrentMonth = currentView === todayMonth;

  document.getElementById('viewTitle').textContent = info.name.toUpperCase();
  document.getElementById('viewSubtitle').textContent =
    appState.habits.length + ' objectives · ' + info.days + ' days' + (isCurrentMonth ? ' · ACTIVE' : '');

  let head = '<tr><th rowspan="2" class="col-habit">OBJECTIVES</th>';
  for (let i = 0; i < info.days; i += 7) {
    head += '<th colspan="' + Math.min(7, info.days - i) + '" class="week-header">WK ' + (Math.floor(i / 7) + 1) + '</th>';
  }
  head += '<th rowspan="2" class="col-progress">STATUS</th></tr><tr>';
  for (let i = 1; i <= info.days; i++) {
    const isToday = isCurrentMonth && (i - 1) === todayDay;
    head += '<th' + (isToday ? ' class="today-col"' : '') + '>' + (isToday ? '◉' : i) + '</th>';
  }
  head += '</tr>';
  document.getElementById('tableHead').innerHTML = head;

  let rows = '', cards = '';
  let totalDone = 0, totalPossible = 0;
  const circ = (2 * Math.PI * 18).toFixed(1);

  appState.habits.forEach((name, r) => {
    let done = 0;
    for (let d = 0; d < info.days; d++) if (appState.data[key(currentView, r, d)]) done++;
    const pct = Math.round((done / info.days) * 100);
    const streak = isCurrentMonth ? getCurrentStreak(r) : 0;
    totalDone += done; totalPossible += info.days;

    const dotColor = pct >= 80 ? 'var(--primary)' : pct >= 40 ? '#8a7430' : pct > 0 ? 'var(--red)' : '#2c2c32';
    const safeName = name.replace(/"/g, '&quot;');

    rows += '<tr><td class="col-habit"><div class="habit-cell">'
      + '<button class="btn-delete" onclick="removeTask(' + r + ')" title="Remove objective">&times;</button>'
      + '<div class="reorder-btns">'
      + '<button class="btn-move" onclick="moveTask(' + r + ',-1)" title="Move up">▲</button>'
      + '<button class="btn-move" onclick="moveTask(' + r + ',1)" title="Move down">▼</button>'
      + '</div>'
      + '<div class="row-dot" style="background:' + dotColor + '"></div>'
      + '<span class="streak-badge' + (streak >= 2 ? ' visible' : '') + '">' + (streak >= 2 ? '★ ' + streak : '') + '</span>'
      + '<input class="habit-input" value="' + safeName + '" onchange="updateTaskName(' + r + ',this.value)"' + (isEditing ? '' : ' readonly') + '>'
      + '</div></td>';

    for (let c = 0; c < info.days; c++) {
      const isToday = isCurrentMonth && c === todayDay;
      const checked = appState.data[key(currentView, r, c)] ? ' checked' : '';
      rows += '<td class="check-cell' + (isToday ? ' today-col' : '') + '" onclick="toggleCheckbox(' + currentView + ',' + r + ',' + c + ')"><input type="checkbox"' + checked + '></td>';
    }

    rows += '<td><div class="progress-text">' + pct + '%</div>'
      + '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="progress-count">' + done + '/' + info.days + '</div></td></tr>';

    const isDoneToday = isCurrentMonth && !!appState.data[key(currentView, r, todayDay)];
    const dash = (pct / 100 * 2 * Math.PI * 18).toFixed(1);
    const todayLabel = isCurrentMonth ? (isDoneToday ? ' · ✓ COMPLETE TODAY' : ' · PENDING TODAY') : '';
    cards += '<div class="mobile-card' + (isEditing ? ' edit-mode' : '') + (isDoneToday ? ' done-today' : '') + '" '
      + 'onclick="' + (isEditing ? 'event.stopPropagation()' : 'openModal(' + r + ')') + '">'
      + '<div class="mobile-card-header"><div class="mobile-card-left">'
      + '<span class="mobile-card-name">' + safeName + '</span>'
      + '<span class="mobile-card-meta">' + done + '/' + info.days + ' DAYS' + todayLabel + '</span>'
      + (streak >= 2 ? '<div class="mobile-streak">★ ' + streak + '-DAY STREAK</div>' : '')
      + '</div><div class="mobile-ring"><svg viewBox="0 0 44 44">'
      + '<circle cx="22" cy="22" r="18" fill="none" stroke="#23242c" stroke-width="4"/>'
      + '<circle cx="22" cy="22" r="18" fill="none" stroke="#c9a437" stroke-width="4" stroke-dasharray="' + dash + ' ' + circ + '" stroke-linecap="round"/>'
      + '</svg><div class="mobile-ring-text">' + pct + '%</div></div></div>'
      + '<div class="mobile-edit-footer"><div style="display:flex;gap:8px;">'
      + '<button class="btn-mobile-sm" onclick="event.stopPropagation();moveTask(' + r + ',-1)">▲</button>'
      + '<button class="btn-mobile-sm" onclick="event.stopPropagation();moveTask(' + r + ',1)">▼</button>'
      + '</div><button class="btn-mobile-del" onclick="event.stopPropagation();removeTask(' + r + ')">Delete</button></div>'
      + '</div>';
  });

  document.getElementById('tableBody').innerHTML = rows;
  document.getElementById('mobileTaskList').innerHTML = cards;

  const monthPct = Math.round((totalDone / Math.max(totalPossible, 1)) * 100);
  const pill = document.getElementById('statsPill');
  if (isCurrentMonth) {
    const doneToday = appState.habits.filter((_, r) => appState.data[key(currentView, r, todayDay)]).length;
    pill.innerHTML = 'Today: <span>' + doneToday + '/' + appState.habits.length + '</span> · Month: <span>' + monthPct + '%</span>';
  } else {
    pill.innerHTML = 'Month: <span>' + monthPct + '%</span>';
  }

  updateCharts(currentView);
  renderFooterStats(currentView);
}

function renderYear() {
  document.getElementById('viewTitle').textContent = YEAR + ' DEBRIEF';
  document.getElementById('viewSubtitle').textContent = appState.habits.length + ' objectives tracked';

  let head = '<tr><th class="col-habit">OBJECTIVES</th>';
  monthsInfo.forEach(m => { head += '<th>' + m.name.substring(0, 3) + '</th>'; });
  head += '<th class="col-progress">TOTAL</th></tr>';
  document.getElementById('tableHead').innerHTML = head;

  let rows = '', cards = '';
  let grandDone = 0, grandTotal = 0;
  const circ = (2 * Math.PI * 18).toFixed(1);

  appState.habits.forEach((name, r) => {
    const safeName = name.replace(/"/g, '&quot;');
    rows += '<tr><td class="col-habit"><div class="habit-cell">'
      + '<button class="btn-delete" onclick="removeTask(' + r + ')">&times;</button>'
      + '<input class="habit-input" value="' + safeName + '" onchange="updateTaskName(' + r + ',this.value)"' + (isEditing ? '' : ' readonly') + '>'
      + '</div></td>';

    let yrDone = 0, yrDays = 0;
    monthsInfo.forEach((m, mi) => {
      let mDone = 0;
      for (let d = 0; d < m.days; d++) if (appState.data[key(mi, r, d)]) { mDone++; yrDone++; }
      yrDays += m.days;
      const mPct = Math.round((mDone / m.days) * 100);
      const color = mPct >= 80 ? 'var(--primary)' : mPct >= 50 ? '#9b8338' : mPct > 0 ? 'var(--red)' : '#34343a';
      rows += '<td class="summary-cell" style="color:' + color + '">' + (mPct > 0 ? mPct + '%' : '—') + '</td>';
    });
    grandDone += yrDone; grandTotal += yrDays;

    const yrPct = Math.round((yrDone / yrDays) * 100);
    rows += '<td><div class="progress-text">' + yrPct + '%</div>'
      + '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + yrPct + '%"></div></div>'
      + '<div class="progress-count">' + yrDone + '/' + yrDays + '</div></td></tr>';

    const dash = (yrPct / 100 * 2 * Math.PI * 18).toFixed(1);
    cards += '<div class="mobile-card"><div class="mobile-card-header"><div class="mobile-card-left">'
      + '<span class="mobile-card-name">' + safeName + '</span>'
      + '<span class="mobile-card-meta">' + yrDone + ' OF ' + yrDays + ' DAYS THIS YEAR</span>'
      + '</div><div class="mobile-ring"><svg viewBox="0 0 44 44">'
      + '<circle cx="22" cy="22" r="18" fill="none" stroke="#23242c" stroke-width="4"/>'
      + '<circle cx="22" cy="22" r="18" fill="none" stroke="#c9a437" stroke-width="4" stroke-dasharray="' + dash + ' ' + circ + '" stroke-linecap="round"/>'
      + '</svg><div class="mobile-ring-text">' + yrPct + '%</div></div></div></div>';
  });

  document.getElementById('tableBody').innerHTML = rows;
  document.getElementById('mobileTaskList').innerHTML = cards;
  document.getElementById('statsPill').innerHTML =
    'Year: <span>' + Math.round((grandDone / Math.max(grandTotal, 1)) * 100) + '%</span>';

  updateCharts(12);
  renderFooterStats(12);
}

// ════════════════ DESKTOP SIDEBAR ════════════════
function renderDesktopSidebar() {
  const habitsEl = document.getElementById('sidebarHabits');
  const statsEl  = document.getElementById('sidebarStats');
  const subEl    = document.getElementById('sidebarSub');
  const markBtn  = document.getElementById('sidebarMarkBtn');
  const dateEl   = document.getElementById('sidebarDate');
  if (!habitsEl) return;

  dateEl.textContent = today.toLocaleDateString('en-AU',
    { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();

  if (currentView !== todayMonth) {
    habitsEl.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'sidebar-msg';
    msg.textContent = 'Return to current month to run today\u2019s protocol';
    habitsEl.appendChild(msg);
    statsEl.style.display = 'none';
    markBtn.style.display = 'none';
    subEl.textContent = '';
    return;
  }
  statsEl.style.display = 'grid';
  markBtn.style.display = 'block';

  const doneCount = appState.habits.filter((_, r) => appState.data[key(currentView, r, todayDay)]).length;
  const allDone = doneCount === appState.habits.length && appState.habits.length > 0;
  subEl.textContent = doneCount + ' / ' + appState.habits.length + ' objectives complete';
  markBtn.textContent = allDone ? '★ Mission Accomplished' : 'Mission Complete';
  markBtn.classList.toggle('all-done', allDone);

  habitsEl.innerHTML = '';
  appState.habits.forEach((name, r) => {
    const done = !!appState.data[key(currentView, r, todayDay)];
    const row = document.createElement('div');
    row.className = 'sb-habit' + (done ? ' done' : '');
    row.title = 'Press ' + (r + 1) + ' to toggle';
    row.onclick = () => toggleTodayHabit(r);

    const ico = document.createElement('span');
    ico.className = 'sb-icon';
    ico.textContent = done ? '✓' : ICONS[r % ICONS.length];
    if (done) { ico.style.color = '#c9a437'; ico.style.fontWeight = '700'; }

    const nm = document.createElement('span');
    nm.className = 'sb-name';
    nm.textContent = name;

    const chk = document.createElement('div');
    chk.className = 'sb-check';

    row.append(ico, nm, chk);
    habitsEl.appendChild(row);
  });

  const info = monthsInfo[currentView];
  let monthDone = 0, monthTotal = 0, longest = 0;
  appState.habits.forEach((_, r) => {
    let s = 0;
    for (let d = 0; d < info.days; d++) {
      if (appState.data[key(currentView, r, d)]) { monthDone++; s++; if (s > longest) longest = s; }
      else s = 0;
    }
    monthTotal += info.days;
  });
  const pct = Math.round((monthDone / Math.max(monthTotal, 1)) * 100);
  statsEl.innerHTML = '';
  [[pct + '%', 'Success'], [longest + '★', 'Best Streak'],
   [monthDone, 'Ops Done'], [appState.habits.length, 'Objectives']].forEach(([val, lbl]) => {
    const item = document.createElement('div');
    item.className = 'ss-item';
    const v = document.createElement('div'); v.className = 'ss-val'; v.textContent = val;
    const l = document.createElement('div'); l.className = 'ss-lbl'; l.textContent = lbl;
    item.append(v, l);
    statsEl.appendChild(item);
  });
}

// ════════════════ MOBILE TODAY PANEL ════════════════
function renderTodayPanel() {
  const panel = document.getElementById('todayPanel');
  const divider = document.getElementById('todayDivider');
  if (currentView !== todayMonth) {
    panel.innerHTML = '';
    divider.style.display = 'none';
    return;
  }
  const dateStr = today.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
  const doneCount = appState.habits.filter((_, r) => appState.data[key(currentView, r, todayDay)]).length;

  let html = '<div class="today-panel-header"><div class="today-panel-title">TODAY\u2019S MISSION</div>'
    + '<div class="today-panel-date">' + dateStr.toUpperCase() + '<br>' + doneCount + '/' + appState.habits.length + ' COMPLETE</div></div>'
    + '<div class="today-habits-grid">';
  appState.habits.forEach((name, r) => {
    const done = !!appState.data[key(currentView, r, todayDay)];
    const shortName = name.length > 14 ? name.substring(0, 13) + '…' : name;
    html += '<div class="today-habit-btn' + (done ? ' done' : '') + '" onclick="toggleTodayHabit(' + r + ')">'
      + '<span class="today-habit-icon">' + (done ? '✓' : ICONS[r % ICONS.length]) + '</span>'
      + '<span class="today-habit-name">' + shortName.replace(/</g, '&lt;') + '</span></div>';
  });
  html += '</div>';
  panel.innerHTML = html;
  divider.style.display = 'block';
}

// ════════════════ MOBILE NAV ════════════════
function updateMobileNav() {
  document.getElementById('mobNavMonth').textContent =
    currentView === 12 ? String(YEAR) : monthsInfo[currentView].name.toUpperCase();
  document.getElementById('mobNavYear').textContent =
    currentView === 12 ? 'ANNUAL DEBRIEF' : 'MISSION LOG ' + YEAR;
}

function mobileNavMonth(dir) {
  haptic(8);
  const next = currentView + dir;
  if (next < 0 || next > 12) return;
  currentView = next;
  renderView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════ FOOTER STATS ════════════════
function renderFooterStats(view) {
  const el = document.getElementById('footerStats');
  el.innerHTML = '';
  const addStat = (val, lbl) => {
    const item = document.createElement('div');
    item.className = 'stat-item';
    const v = document.createElement('div'); v.className = 'stat-value'; v.textContent = val;
    const l = document.createElement('div'); l.className = 'stat-label'; l.textContent = lbl;
    item.append(v, l);
    el.appendChild(item);
  };

  if (view === 12) {
    let total = 0, possible = 0;
    appState.habits.forEach((_, r) => {
      monthsInfo.forEach((m, mi) => {
        for (let d = 0; d < m.days; d++) {
          if (appState.data[key(mi, r, d)]) total++;
          possible++;
        }
      });
    });
    addStat(total, 'Ops Completed');
    addStat(appState.habits.length, 'Objectives');
    addStat(Math.round((total / Math.max(possible, 1)) * 100) + '%', 'Success Rate');
  } else {
    const info = monthsInfo[view];
    let totalDone = 0, longest = 0;
    appState.habits.forEach((_, r) => {
      let s = 0;
      for (let d = 0; d < info.days; d++) {
        if (appState.data[key(view, r, d)]) { totalDone++; s++; if (s > longest) longest = s; }
        else s = 0;
      }
    });
    addStat(totalDone, 'Ops This Month');
    addStat(longest + '★', 'Best Streak');
    addStat(appState.habits.length, 'Objectives');
  }
}

// ════════════════ DAY MODAL ════════════════
function openModal(r) {
  haptic(8);
  const info = monthsInfo[currentView];
  document.getElementById('modalTaskName').textContent = appState.habits[r];
  document.getElementById('modalMonthName').textContent = info.name.toUpperCase() + ' ' + YEAR + ' · FIELD LOG';

  let done = 0;
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';

  for (let d = 0; d < info.days; d++) {
    const k = key(currentView, r, d);
    if (appState.data[k]) done++;
    const isToday  = currentView === todayMonth && d === todayDay;
    const isFuture = currentView === todayMonth && d > todayDay;
    const btn = document.createElement('div');
    btn.className = 'day-btn'
      + (appState.data[k] ? ' checked' : '')
      + (isToday ? ' today-day' : '')
      + (isFuture ? ' future-day' : '');
    btn.textContent = d + 1;
    if (!isFuture) {
      btn.onclick = () => {
        haptic(10);
        appState.data[k] = !appState.data[k];
        btn.classList.toggle('checked');
        done += appState.data[k] ? 1 : -1;
        updateModalStats(done, info.days);
        safeSave();
        renderView();
      };
    }
    grid.appendChild(btn);
  }
  updateModalStats(done, info.days);
  document.getElementById('dayModal').style.display = 'flex';
}

function updateModalStats(done, total) {
  document.getElementById('modalPct').textContent = Math.round((done / total) * 100) + '%';
  document.getElementById('modalDaysInfo').innerHTML =
    '<strong>' + done + '</strong> DAYS COMPLETE<br>' + (total - done) + ' REMAINING';
}

function closeModal() {
  document.getElementById('dayModal').style.display = 'none';
}

document.getElementById('dayModal').addEventListener('click', e => {
  if (e.target.id === 'dayModal') closeModal();
});

// ════════════════ ACTIONS ════════════════
function toggleCheckbox(m, r, c) {
  haptic(10);
  const k = key(m, r, c);
  appState.data[k] = !appState.data[k];
  safeSave();
  renderView();
}

function toggleTodayHabit(r) {
  if (currentView !== todayMonth) return;
  haptic(12);
  const k = key(currentView, r, todayDay);
  appState.data[k] = !appState.data[k];
  const allDone = appState.habits.every((_, i) => appState.data[key(currentView, i, todayDay)]);
  if (allDone) { showToast('★ Mission accomplished, agent', true); haptic([30, 20, 30]); }
  safeSave();
  renderView();
}

function markAllToday() {
  if (currentView !== todayMonth) return;
  haptic(12);
  const allDone = appState.habits.every((_, r) => appState.data[key(currentView, r, todayDay)]);
  appState.habits.forEach((_, r) => {
    appState.data[key(currentView, r, todayDay)] = !allDone;
  });
  safeSave();
  renderView();
  showToast(allDone ? 'Today cleared' : '★ Mission accomplished', !allDone);
}

function updateTaskName(i, v) {
  appState.habits[i] = v.toUpperCase().trim() || 'UNNAMED OBJECTIVE';
  safeSave();
  renderView();
}

function addTask() {
  appState.habits.push('NEW OBJECTIVE');
  safeSave();
  renderView();
  showToast('✓ Objective added', true);
}

function removeTask(i) {
  if (!confirm('Decommission "' + appState.habits[i] + '"? All field data for this objective will be destroyed.')) return;
  appState.habits.splice(i, 1);
  const newData = {};
  Object.entries(appState.data).forEach(([k, v]) => {
    if (!v) return;
    const [m, row, d] = k.split('_').map(Number);
    if (row < i) newData[k] = v;
    else if (row > i) newData[key(m, row - 1, d)] = v;
  });
  appState.data = newData;
  safeSave();
  renderView();
  showToast('Objective decommissioned');
}

function moveTask(index, direction) {
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= appState.habits.length) return;
  [appState.habits[index], appState.habits[newIndex]] =
    [appState.habits[newIndex], appState.habits[index]];
  const newData = {};
  Object.entries(appState.data).forEach(([k, v]) => {
    if (!v) return;
    const [m, row, d] = k.split('_').map(Number);
    if (row === index) newData[key(m, newIndex, d)] = v;
    else if (row === newIndex) newData[key(m, index, d)] = v;
    else newData[k] = v;
  });
  appState.data = newData;
  safeSave();
  renderView();
}

function toggleEditMode() {
  isEditing = !isEditing;
  document.getElementById('mainDashboard').classList.toggle('is-editing', isEditing);
  document.getElementById('editToggleBtn').textContent = isEditing ? '✓ Done' : '✏️ Edit Objectives';
  renderView();
}

// ════════════════ CHARTS ════════════════
function updateCharts(view) {
  let totalAvg = 0;
  const dailyPcts = [];

  if (view === 12) {
    let yrD = 0, yrT = 0;
    monthsInfo.forEach((m, mi) => {
      appState.habits.forEach((_, r) => {
        for (let d = 0; d < m.days; d++) {
          if (appState.data[key(mi, r, d)]) yrD++;
          yrT++;
        }
      });
    });
    totalAvg = yrT > 0 ? Math.round((yrD / yrT) * 100) : 0;
  } else {
    const info = monthsInfo[view];
    const n = appState.habits.length;
    for (let c = 0; c < info.days; c++) {
      let cnt = 0;
      for (let r = 0; r < n; r++) if (appState.data[key(view, r, c)]) cnt++;
      dailyPcts.push(n ? Math.round((cnt / n) * 100) : 0);
    }
    totalAvg = dailyPcts.length
      ? Math.round(dailyPcts.reduce((a, b) => a + b, 0) / info.days) : 0;
  }

  document.getElementById('doughnutFill').setAttribute('stroke-dasharray', totalAvg + ',100');
  document.getElementById('doughnutText').textContent = totalAvg + '%';

  const lineEl = document.getElementById('areaPathLine');
  const fillEl = document.getElementById('areaPathFill');
  if (dailyPcts.length > 1) {
    const W = 200, H = 70, n = dailyPcts.length;
    const pts = dailyPcts.map((p, i) => ({
      x: (i / (n - 1)) * W,
      y: H - (p / 100) * (H - 4) - 2
    }));
    let line = 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1);
    for (let i = 1; i < pts.length; i++) {
      const dx = (pts[i].x - pts[i - 1].x) / 3;
      line += ' C' + (pts[i - 1].x + dx).toFixed(1) + ',' + pts[i - 1].y.toFixed(1)
        + ' ' + (pts[i].x - dx).toFixed(1) + ',' + pts[i].y.toFixed(1)
        + ' ' + pts[i].x.toFixed(1) + ',' + pts[i].y.toFixed(1);
    }
    lineEl.setAttribute('d', line);
    fillEl.setAttribute('d', line + ' L' + W + ',' + H + ' L0,' + H + ' Z');
  } else {
    lineEl.setAttribute('d', '');
    fillEl.setAttribute('d', '');
  }
}

// ════════════════ KEYBOARD ════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (!appState) return;
  if (e.key === 'Escape') { closeModal(); return; }
  if (e.key === 'ArrowRight') { mobileNavMonth(1); return; }
  if (e.key === 'ArrowLeft')  { mobileNavMonth(-1); return; }
  const num = parseInt(e.key, 10);
  if (num >= 1 && num <= Math.min(appState.habits.length, 9) && currentView === todayMonth) {
    toggleTodayHabit(num - 1);
  }
});

// ════════════════ SWIPE (mobile) ════════════════
(function () {
  let startX = 0, startY = 0;
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!appState) return;
    if (document.getElementById('dayModal').style.display === 'flex') return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return;
    mobileNavMonth(dx < 0 ? 1 : -1);
  }, { passive: true });
})();
</script>
